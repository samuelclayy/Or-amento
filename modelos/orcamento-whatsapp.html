<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orçamento WhatsApp</title>
  <link rel="stylesheet" href="../css/style.css" />
  <script src="../js/whatsapp.js" defer></script>
</head>
<body>
  <div class="main-container">
    <div class="form-section">
      <h1>Orçamento WhatsApp</h1>
      <p>Preencha os dados abaixo para gerar um texto pronto para copiar e colar no WhatsApp.</p>

      <div class="form-grid">
        <div class="form-group">
          <label for="wpp-produto">Produto</label>
          <input type="text" id="wpp-produto" />
        </div>
        <div class="form-group">
          <label for="wpp-valor">Valor (R$)</label>
          <input type="number" id="wpp-valor" min="0" step="0.01" />
        </div>
        <div class="form-group">
          <label for="wpp-imediato">Imediato</label>
          <select id="wpp-imediato">
            <option value="Sim">Sim</option>
            <option value="Não">Não</option>
          </select>
        </div>
        <div class="form-group">
          <label for="wpp-imposto">Imposto (revenda/lucro presumido)</label>
          <input type="text" id="wpp-imposto" placeholder="Ex: 12% ICMS" />
        </div>
      </div>

      <div class="form-group" style="margin-top:12px;">
        <label for="wpp-observacoes">Observações opcionais</label>
        <textarea id="wpp-observacoes" placeholder="Ex: Prazo de entrega, condições especiais..."></textarea>
      </div>

      <div class="button-row" style="margin-top:16px;">
        <button type="button" id="wpp-gerar">Gerar texto WhatsApp</button>
        <button type="button" id="wpp-copiar" disabled>Copiar para WhatsApp</button>
        <button type="button" onclick="location.href='../index.html'">Voltar</button>
      </div>
    </div>

    <div class="form-section">
      <h2>Texto gerado</h2>
      <div class="form-group">
        <label for="wpp-resultado">Copie o texto abaixo e cole no WhatsApp:</label>
        <textarea id="wpp-resultado" readonly style="min-height:160px;"></textarea>
      </div>
    </div>
  </div>
</body>
</html>
